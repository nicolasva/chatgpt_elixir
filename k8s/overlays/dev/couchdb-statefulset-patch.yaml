apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: couchdb
  namespace: chatbot
spec:
  template:
    spec:
      containers:
        - name: couchdb
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
  volumeClaimTemplates:
    - metadata:
        name: couchdb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 1Gi
