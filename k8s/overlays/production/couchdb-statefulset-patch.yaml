apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: couchdb
  namespace: chatbot
spec:
  template:
    spec:
      containers:
        - name: couchdb
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: couchdb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
